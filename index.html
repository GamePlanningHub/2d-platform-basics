<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6. 2D 플랫폼의 이해</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg-void: #08090d;
    --bg-surface: #0e1019;
    --bg-elevated: #141722;
    --bg-card: #181c2a;
    --bg-glass: rgba(20, 23, 34, 0.75);
    --border-subtle: rgba(255,255,255,0.04);
    --border-dim: rgba(255,255,255,0.08);
    --border-accent: rgba(129,140,248,0.3);
    --text-primary: #eaedf3;
    --text-secondary: #8b95a8;
    --text-muted: #5a6478;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --accent-bright: #a5b4fc;
    --gold: #f0c040;
    --gold-dim: rgba(240,192,64,0.12);
    --green: #6ee7a0;
    --green-dim: rgba(110,231,160,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* 배경 그라디언트 앰비언트 */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(129,140,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(240,192,64,0.03) 0%, transparent 50%);
}

/* ========== 오디오 바 (Glass Morphism) ========== */
#audio-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
}
#audio-controls {
    display: flex; align-items: center; gap: 14px;
    max-width: 860px; margin: 0 auto;
}
#play-btn {
    background: var(--accent);
    border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
    transition: var(--transition);
    flex-shrink: 0;
}
#play-btn:hover {
    background: var(--accent-bright);
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(129,140,248,0.3), 0 4px 12px rgba(0,0,0,0.4);
}
.skip-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
}
.skip-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
}
#time-display {
    color: var(--text-muted); font-size: 12px;
    min-width: 90px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
}

/* 커스텀 시크바 */
#seek-bar {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--border-dim);
    border-radius: 2px; outline: none;
    cursor: pointer; transition: height 0.15s ease;
}
#seek-bar:hover { height: 6px; }
#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    cursor: pointer;
    transition: var(--transition);
}
#seek-bar::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
}
#seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%; border: none;
    background: var(--accent);
    cursor: pointer;
}

#speed-select {
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border-dim);
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; outline: none;
    transition: var(--transition);
}
#speed-select:hover { border-color: var(--accent); }

/* ========== 슬라이드 네비게이션 ========== */
#slide-nav {
    display: flex; gap: 3px; padding: 12px 24px;
    overflow-x: auto; background: var(--bg-surface);
    border-bottom: 1px solid var(--border-subtle);
    justify-content: center; flex-wrap: wrap;
    scrollbar-width: none;
}
#slide-nav::-webkit-scrollbar { display: none; }

.nav-dot {
    width: 34px; height: 30px; border-radius: 6px;
    border: 1px solid transparent; cursor: pointer;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    position: relative;
}
.nav-dot.has-audio {
    background: rgba(129,140,248,0.08); color: var(--accent);
    border-color: rgba(129,140,248,0.12);
}
.nav-dot.no-audio {
    background: rgba(255,255,255,0.02); color: var(--text-muted);
    opacity: 0.5;
}
.nav-dot:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: var(--accent);
}
.nav-dot.active {
    background: var(--accent); color: #fff;
    transform: translateY(-2px) scale(1.05); opacity: 1;
    box-shadow: 0 4px 16px var(--accent-glow);
    border-color: transparent;
}

/* 슬라이드 전환 애니메이션 */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
#slide-content {
    animation: slideIn 0.35s ease-out;
}

#slide-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
#slide-id {
    color: var(--accent); font-size: 11px; letter-spacing: 3px;
    font-weight: 500; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#slide-badge {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.3px;
}
.badge-audio {
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(110,231,160,0.15);
}
.badge-no-audio {
    background: var(--red-dim); color: var(--red);
    border: 1px solid rgba(248,113,113,0.12);
}

#slide-title {
    font-size: 26px; font-weight: 900; color: #fff;
    margin-bottom: 32px; line-height: 1.5;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-dim);
    letter-spacing: -0.3px;
}

/* ========== 슬라이드 콘텐츠 블록 ========== */

.slide-text {
    color: var(--text-secondary); font-size: 14.5px;
    line-height: 2; margin-bottom: 20px;
    font-weight: 300;
}
.slide-text strong {
    color: var(--gold); font-weight: 500;
    background: var(--gold-dim);
    padding: 1px 5px; border-radius: 3px;
}
.slide-text em {
    color: var(--accent-bright); font-style: normal; font-weight: 400;
}

/* 인용 블록 */
.slide-quote {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 18px 22px; margin-bottom: 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-primary); font-size: 14px;
    line-height: 1.85; font-weight: 300;
}
.slide-quote strong {
    color: var(--gold); font-weight: 500;
}

/* 포인트 리스트 */
.slide-points {
    list-style: none; margin-bottom: 20px; padding-left: 0;
    display: flex; flex-direction: column; gap: 6px;
}
.slide-points li {
    position: relative;
    padding: 12px 16px 12px 36px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    font-size: 13.5px; line-height: 1.7;
    color: var(--text-secondary); font-weight: 300;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-points li:hover {
    border-color: var(--border-accent);
    background: var(--bg-card);
}
.slide-points li::before {
    content: '';
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
}
.slide-points li strong {
    color: var(--gold); font-weight: 500;
}

/* 노트 블록 (aside) */
.slide-note {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 18px 20px; margin-top: 28px;
    position: relative; overflow: hidden;
}
.slide-note::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.5;
}
.note-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.note-content {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
}
.note-content strong { color: var(--text-primary); font-weight: 500; }

/* 이미지 */
.slide-image {
    margin-bottom: 20px; text-align: center;
}
.slide-image img {
    max-width: 100%; border-radius: var(--radius);
    border: 1px solid var(--border-dim);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ========== 정의 카드 (> **제목** 본문 패턴) ========== */
.slide-def-card {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: var(--transition);
}
.slide-def-card:hover {
    border-left-color: var(--gold);
    background: rgba(24,28,42,0.9);
}
.def-title {
    color: var(--gold); font-size: 14.5px; font-weight: 700;
    margin-bottom: 8px; letter-spacing: 0.2px;
}
.def-desc {
    color: var(--text-secondary); font-size: 13.5px;
    line-height: 1.8; font-weight: 300;
}
.def-desc strong { color: var(--text-primary); font-weight: 500; }

/* ========== 섹션 카드 (**볼드 헤더** + 본문) ========== */
.slide-card {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 10px;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-card:hover {
    border-color: var(--border-accent);
    transform: translateX(3px);
}
.card-heading {
    color: var(--gold); font-size: 14px; font-weight: 700;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.card-heading::before {
    content: ''; display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
    flex-shrink: 0;
}
.card-desc {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
    padding-left: 11px;
}
.card-desc strong { color: var(--text-primary); font-weight: 500; }
.card-desc em { color: var(--accent-bright); font-style: normal; }

/* ========== 오디오 구간 맵 (재생바 아래 타임라인) ========== */
#audio-map {
    max-width: 860px; margin: 8px auto 0;
    height: 22px;
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg-elevated);
}
.map-segment {
    position: absolute; top: 0; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: filter 0.15s;
    overflow: hidden;
    white-space: nowrap;
    border-right: 1px solid var(--bg-void);
}
.map-segment:hover {
    filter: brightness(1.3);
    z-index: 1;
}
.map-segment.active {
    filter: brightness(1.4);
    color: #fff;
    font-weight: 700;
}
/* 구간별 색상 (순서대로 순환) */
.map-segment:nth-child(odd)  { background: rgba(129,140,248,0.35); }
.map-segment:nth-child(even) { background: rgba(240,192,64,0.25); }
.map-gap {
    position: absolute; top: 0; height: 100%;
    background: var(--bg-elevated);
}

/* ========== 메인 레이아웃 (콘텐츠 + 인덱스) ========== */
#main-layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
}
#slide-area {
    flex: 1;
    min-width: 0;
}
#slide-container {
    max-width: 800px; margin: 0 auto;
    padding: 40px 28px 80px;
}

/* ========== 인덱스 패널 (우측 사이드바) ========== */
#index-panel {
    width: 240px;
    flex-shrink: 0;
    border-left: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
}
#index-panel::-webkit-scrollbar { width: 4px; }
#index-panel::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

#index-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border-subtle);
}

.index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 2px solid transparent;
    font-size: 12px;
    line-height: 1.5;
}
.index-item:hover {
    background: var(--bg-elevated);
    border-left-color: var(--border-accent);
}
.index-item.active {
    background: var(--bg-card);
    border-left-color: var(--accent);
}
.index-item .idx-id {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 28px;
}
.index-item .idx-title {
    color: var(--text-secondary);
    font-weight: 300;
}
.index-item.active .idx-title {
    color: var(--text-primary);
    font-weight: 400;
}
.index-item.has-audio .idx-id::after {
    content: ' ♪';
    color: var(--green);
    font-size: 8px;
}

/* ========== 반응형 ========== */
@media (max-width: 900px) {
    #index-panel { display: none; }
    #main-layout { display: block; }
}
@media (max-width: 640px) {
    /* 오디오 바 */
    #audio-bar { padding: 10px 12px; }
    #audio-controls { gap: 6px; }
    #play-btn { width: 36px; height: 36px; font-size: 14px; }
    .skip-btn { width: 30px; height: 30px; font-size: 11px; }
    #time-display { min-width: 70px; font-size: 10px; }
    #speed-select { padding: 4px 6px; font-size: 10px; }

    /* 네비게이션 도트: 가로 스크롤 */
    #slide-nav {
        flex-wrap: nowrap;
        justify-content: flex-start;
        padding: 8px 12px;
        gap: 2px;
    }
    .nav-dot { width: 28px; height: 26px; font-size: 9px; flex-shrink: 0; }

    /* 슬라이드 영역 */
    #slide-container { padding: 20px 14px 80px; }
    #slide-title { font-size: 20px; margin-bottom: 20px; padding-bottom: 14px; }
    #slide-header { gap: 8px; margin-bottom: 8px; }
    #slide-id { font-size: 10px; }
    #slide-badge { font-size: 9px; padding: 2px 8px; }

    /* 콘텐츠 블록 */
    .slide-text { font-size: 13.5px; line-height: 1.9; }
    .slide-card { padding: 16px; }
    .slide-def-card { padding: 14px; }
    .slide-note { padding: 14px 16px; font-size: 12.5px; }
    .slide-points li { font-size: 13.5px; }
    .slide-image img { max-height: 50vh; }

    /* 자막 바 */
    #subtitle-bar { padding: 10px 14px; }
    #subtitle-text { font-size: 0.9rem; }
}

/* 자막 바 */
#subtitle-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 14px 24px;
    background: rgba(0, 0, 0, 0.82);
    z-index: 1000;
    pointer-events: none;
    min-height: 24px;
}

#subtitle-text {
    color: #f0f0f0;
    font-size: 1.05rem;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    transition: opacity 0.15s ease;
}

#subtitle-bar:empty,
#subtitle-bar:has(#subtitle-text:empty) {
    opacity: 0;
}

</style>
</head>
<body>
<div id="app">
  <div id="audio-bar">
    <audio id="audio" src="2D_게임_화면_뒤에_숨은_영리한_꼼수들.m4a" preload="auto"></audio>
    <div id="audio-controls">
      <button class="skip-btn" onclick="skipTime(-10)">⏪</button>
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <button class="skip-btn" onclick="skipTime(10)">⏩</button>
      <span id="time-display">0:00 / 0:00</span>
      <input type="range" id="seek-bar" min="0" max="86400" value="0" step="0.1">
      <select id="speed-select" onchange="changeSpeed(this.value)">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
    <div id="audio-map"></div>
  </div>
  <div id="slide-nav"></div>
  <div id="main-layout">
    <div id="slide-area">
      <div id="slide-container">
        <div id="slide-header">
          <span id="slide-id"></span>
          <span id="slide-badge"></span>
        </div>
        <h1 id="slide-title"></h1>
        <div id="slide-content"></div>
      </div>
    </div>
    <div id="index-panel">
      <div id="index-header">목차</div>
      <div id="index-list"></div>
    </div>
  </div>
</div>
<div id="subtitle-bar">
  <span id="subtitle-text"></span>
</div>
<script>
const SLIDES = [
  {
    "id": "P1",
    "title": "2D 세계의 구성",
    "content": "<div class=\"slide-text\">평면 위에서 펼쳐지는 게임 세계는 여러 시각적 요소들이 층층이 쌓여 만들어진다. 레이어, 스프라이트, 타일 들의 구성 요소를 이해하면 효율적인 2D 게임을 설계할 수 있다.</div>",
    "hasAudio": true,
    "start": 0.0,
    "end": 85.0
  },
  {

slide-text\"></div>",

    "id": "P3",
    "title": "레이어",
    "content": "<div class=\"slide-text\">2D 이미지를 투명한 필름처럼 여러 겹으로 쌓아올린 구조</div>\n<div class=\"slide-card\"><div class=\"card-heading\">레이어  구성의 목적</div></div>\n<ul class=\"slide-points\"><li>UI 요소의 독립적 표시</li><li>게임 세계의 깊이감 구현</li><li>이펙트와 특수 효과 분리</li><li>이미지 재활용으로 용량 절약</li></ul>\n<div class=\"slide-text\">메모리의 특성 : 로드 속도 매우 빠름 / 용량이 채워질수록 속도가 느려짐<br>→ 슈퍼마리오의 리소스 우려먹기는 단순 용량만을 위해서가 아닌 <strong>당시의 램 처리력을 커버하기 위해!</strong></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">일반적으로는 해당 프로그램 또는 화면 전체를 화면의 최대 주사율로 갱신하지만 프로그래밍을 통해 갱신이 가능하다.</div></div>",
    "hasAudio": true,
    "start": 175.0,
    "end": 315.0
  },

    "title": "레이어 분해 예시",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">고전 게임 분석</div></div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-text\">street fighter 2의 ken 스테이지를 레이어별로 분해하면 배경, 구조물, 캐릭터가 각각 독립된 층으로 구성되어 있음을 알 수 있다.</div>\n<div class=\"slide-text\">이러한 분리는 애니메이션 처리와 충돌 감지를 효율적으로 만들어준다.</div>\n<div class=\"slide-text\">→ 움직임이 <strong>따로 노는 부분</strong>이 레이어라고 이해!</div>",

  {
    "id": "P5",
    "title": "레이어 구성 순서",
    "content": "<ul class=\"slide-points\"><li><strong>원경</strong> : 가장 뒤쪽의 배경 이미지</li><li><strong>근경</strong> : 중간 거리의 배경 요소</li><li><strong>지형</strong> : 플레이어가 서 있는 땅</li><li><strong>고정 오브젝트</strong> : 구조물 등 움직이지 않는 요소</li><li><strong>유동 오브젝트</strong> : 캐릭터, 몬스터, 아이템</li><li><strong>이펙트</strong> : 각종 시각 효과</li><li><strong>환경 효과</strong> : 날씨, 시간 표시</li><li><strong>커서 및 UI</strong> : 가장 앞족의 인터페이스</li></ul>",
    "hasAudio": true,
    "start": 290.0,
    "end": 330.0
  },
  {
    "id": "P6",
    "title": "동적으로 변화하는 레이어",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">생성과 소멸</div><div class=\"card-desc\">특정 상황에서만 나타나거나 사라지는 레이어가 있다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">순서 변경</div><div class=\"card-desc\">캐릭터의 위치에 따라 앞뒤 순서가 동적으로 바뀐다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">시각 효과</div><div class=\"card-desc\">반투명, 흑백 등의 효과가 상황에 따라 적용된다. → 두개의 이미지의 RGB 값을 상호 연산하여 출력!</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">‘<strong>동적</strong>’ 의 프로그래밍상 개념<br><strong>CPU</strong> : 중앙 처리 장치 (제일 빠름)<br><strong>RAM</strong> : 랜덤 액세스 메모리 (두번째로 빠름)<br><strong>SSD</strong> : 솔리드 스테이트 드라이브 / HDD : 하드 디스크 드라이브 (저장 장치)<br><strong>GPU</strong> : 그래픽 처리 장치<br>SSD에서 CPU로 직접 떠온다면 연산에 필요한 파일을 로드하는 속도가 매우 느리다.<br>따라서 프로그램을 실행할 때 필요한 파일을 SSD에서 램에 미리 로드한 후 연산한다.<br><strong>Q</strong>: 그럼 SSD 대신 커다란 램에 전부 저장하면 되지 않나요?<br><strong>A</strong>: 램은 전원이 들어와 있을 때만 저장되고 전원이 끊어지면 데이터가 모두 지워지는 ‘휘발성 메모리’라서 그렇게 하면 큰일난다.<br>동적 → 프로그램에서 실시간으로 램의 공간을 할당한다는 용어로 사용됨 → 실시간<br><strong>동적 변화 레이어</strong> → 프레임의 순서가 실시간으로 변화하는 경우 = 게임 중에 변화하는 레이어</div></div>",
    "hasAudio": true,
    "start": 312.0,
    "end": 410.0
  },
  {
    "id": "P7",
    "title": "맵/배경",
    "content": "<div class=\"slide-text\">실제 게임 플레이가 이루어지는 배경</div>\n<div class=\"slide-card\"><div class=\"card-heading\">타일맵의 효율성</div><div class=\"card-desc\">RPG, RTS, 시뮬레이션 등 많은 장르에서 효율성을 이유로 타일 맵을 많이 사용</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">단위 타일 구성</div><div class=\"card-desc\">대개 단위 타일은 게임 플레이를 구성하는 최소 단위의 오브젝트들이 위치</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">이미지 및 속성 관리</div><div class=\"card-desc\">타일 이미지와 속성이 1:1로 대응되는 게임도 있지만 이미지와 속성을 별개로 설정하는 게임도 있다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">오브젝트 상호작용</div><div class=\"card-desc\">타일을 점유한 오브젝트는 상태, 방향, 충돌 등을 체크</div></div>",

const TRANSCRIPT = [{"start": 0.0, "end": 5.42, "text": "여러분이 평소에 가장 좋아하는 ED 격투 게임을 플레이하고 있다고 한번 상상해 보세요"}, {"start": 5.42, "end": 7.26, "text": "네 아주 좋은 접근이네요"}, {"start": 7.26, "end": 10.4, "text": "그 버튼을 탁 누르면 화면 속 캐릭터가 주먹을 뻗잖아요"}, {"start": 10.4, "end": 11.120000000000001, "text": "그렇죠"}, {"start": 11.120000000000001, "end": 14.36, "text": "그리고 퍽 하는 타격음이랑 같이 상대방이 쓰러지고요"}, {"start": 14.36, "end": 18.72, "text": "게이머로서 우리는 그 짜릿한 타격감을 그냥 직관적으로 즐기게 되죠"}, {"start": 18.72, "end": 21.5, "text": "맞아요 게임의 핵심 재미니까요"}, {"start": 21.5, "end": 25.36, "text": "근데 여기서 한 걸음만 딱 물러서서 생각해 보면요"}, {"start": 25.36, "end": 30.64, "text": "도대체 게임 시스템은 내 주먹이 상대방에게 닿았다는 걸 어떻게 알아치는 걸까요?"}, {"start": 30.64, "end": 32.92, "text": "아 아주 예리한 질문입니다"}, {"start": 32.92, "end": 36.92, "text": "화면 너머의 평면 세계는 진짜 마법으로 돌아가는 게 아니거든요"}, {"start": 36.92, "end": 38.2, "text": "그러니까요"}, {"start": 38.2, "end": 42.36, "text": "여러분의 눈에 완벽하게 속이기 위해서 고안된 보이지 않는 상자들"}, {"start": 42.36, "end": 44.36, "text": "또 수학적으로 계산된 뼈대"}, {"start": 44.36, "end": 47.84, "text": "이런 기막힌 꼼수들이 쌓여있는 거대한 데이터 건축물이잖아요"}, {"start": 47.84, "end": 48.72, "text": "정확합니다"}, {"start": 48.72, "end": 51.8, "text": "오늘 우리가 이번 딥다이브에서 집요하게 파헤칠 자료가"}, {"start": 51.8, "end": 56.4, "text": "바로 이 ED게임 기획의 뼈대를 다루는 아주 흥미로운 강의노트입니다"}, {"start": 56.4, "end": 62.0, "text": "저는 게임은 많이 해봤지만 이런 기획이로는 처음인 입문자 입장에서 질문을 던져보려고 해요"}, {"start": 62.0, "end": 62.959999999999994, "text": "좋습니다"}, {"start": 62.959999999999994, "end": 68.67999999999999, "text": "우리가 모니터나 스마트폰으로 보는 ED게임 세계는 그냥 단순히 예쁜 그림 쪼가리가 아니죠"}, {"start": 68.67999999999999, "end": 69.84, "text": "아 단순한 그림이 아니다?"}, {"start": 69.84, "end": 75.08, "text": "네 오히려 과거에 그 열악했던 컴퓨터 하드웨어 한계를 어떻게든 극복하려고"}, {"start": 75.08, "end": 80.6, "text": "개발자들이 진짜 피와 덤으로 깎아낸 치열한 최적화 기술의 결정체라고 할 수 있습니다"}, {"start": 80.6, "end": 85.11999999999999, "text": "오늘 제가 현업 기획자의 시선으로 숨겨진 마법들을 하나씩 풀어드리겠습니다"}, {"start": 85.11999999999999, "end": 86.8, "text": "와 든든하네요"}, {"start": 86.8, "end": 89.56, "text": "자 그렇다면 가장 기초적인 질문부터 바로 던져볼까요?"}, {"start": 89.56, "end": 93.36, "text": "우리가 보는 이 게임의 시각적 요소들은 대체 어떻게 만들어지는 건가요?"}, {"start": 93.36, "end": 100.28, "text": "음 게임 세계를 구성하는 가장 기초적인 이미지 방식을 딱 한 문장으로 정의해볼게요"}, {"start": 100.28, "end": 106.63999999999999, "text": "비트맵은 화면을 픽셀이라는 점 단위로 쪼개서 색상 정보를 저장하는 방식이고요"}, {"start": 106.64, "end": 112.36, "text": "벡터는 좌표와 좌표 사이의 연결을 수학적 연산으로 표현하는 방식입니다"}, {"start": 112.36, "end": 115.32, "text": "오 좋아요 이 부분을 좀 더 파헤쳐볼까요?"}, {"start": 115.32, "end": 116.36, "text": "네 그러시죠"}, {"start": 116.36, "end": 121.88, "text": "그 점을 찍는 거랑 수학 연산이라는 게 화면에서 정확히 무슨 차이를 만드는 건가요?"}, {"start": 121.88, "end": 126.96000000000001, "text": "결국 오니터에 추력해서 우리 눈에 보이는 건 다 똑같은 평면 그래픽 아닌가 싶거든요"}, {"start": 126.96000000000001, "end": 129.76, "text": "아 눈으로 볼 땐 똑같아 보일 수 있죠"}, {"start": 129.76, "end": 134.96, "text": "하지만 화면을 극단적으로 확대하거나 축소할 때 완전히 다른 결과가 나옵니다"}, {"start": 134.96, "end": 137.16, "text": "아하 크기가 변할 때요?"}, {"start": 137.16, "end": 141.4, "text": "맞아요 모바일 게임의 로고나 UI를 한번 떠올려 보세요"}, {"start": 141.4, "end": 148.36, "text": "벡터 방식은 아무리 화면을 축소하거나 돋보기로 확다해도 용량 변화가 없고 절대 깨지지가 않습니다"}, {"start": 148.36, "end": 151.52, "text": "수학공식이 실시간으로 다시 그려내니까요"}, {"start": 151.52, "end": 154.44, "text": "그래서 UI에 아주 찰떡같이 적합한 방식이죠"}, {"start": 154.44, "end": 160.44, "text": "아 반면에 비트맵은 억지로 늘리면 모자이크처럼 계단 현상이 생기면서 깨져버리는 거고요"}, {"start": 160.44, "end": 163.4, "text": "그렇죠 픽셀이 그대로 늘어나니까요"}, {"start": 163.4, "end": 166.32, "text": "그럼 벡터는 고무줄처럼 늘어나는 공식이니까"}, {"start": 166.32, "end": 171.68, "text": "UI에 쓰고 복잡한 캐릭터나 배경은 점을 찍는 비트맵을 쓴다는 건데요"}, {"start": 171.68, "end": 175.92000000000002, "text": "그럼 이런 비트맵과 벡터 이미지들을 화면에 그냥 마구잡이로 뿌리는 건가요?"}, {"start": 175.92000000000002, "end": 178.12, "text": "당연히 마구잡이로 뿌리면 안 되죠"}, {"start": 178.12, "end": 183.20000000000002, "text": "평면 세계에서 시각적 요소들이 층층이 쌓인다고 하셨는데 그건 어떻게 되는 건가요?"}, {"start": 183.20000000000002, "end": 186.88, "text": "복잡한 세계를 화면에 다 우겨넣으면 시스템이 버텨내지 못할 텐데요?"}, {"start": 186.88, "end": 190.92000000000002, "text": "바로 그 문제를 해결하기 위해 도입된 개념이 레이어입니다"}, {"start": 190.92000000000002, "end": 191.68, "text": "레이어요?"}, {"start": 191.68, "end": 198.20000000000002, "text": "네, 레이어란 ED 이미지를 투명한 셀로판즈 필름처럼 여러 겹으로 쌓아 올려서"}, {"start": 198.20000000000002, "end": 202.64000000000001, "text": "게임 세계의 깊이감을 구현하고 리소스를 분리하는 구조를 말합니다"}, {"start": 202.64000000000001, "end": 203.8, "text": "어? 잠깐만요"}, {"start": 203.8, "end": 207.72, "text": "투명한 필름을 겹치는 구조라는 게 정확히 무슨 말이에요?"}, {"start": 207.72, "end": 211.16, "text": "그러니까 도화지 한 장에 다 그리는 게 아니라는 거죠"}, {"start": 211.16, "end": 213.52, "text": "솔직히 저는 이해가 잘 안 가는 게"}, {"start": 213.52, "end": 216.76000000000002, "text": "그냥 한 장의 도화지에 저 멀리 있는 산부터"}, {"start": 216.76000000000002, "end": 221.48000000000002, "text": "내 눈앞의 캐릭터까지 통째로 예쁘게 그려놓는 게 편하지 않나요?"}, {"start": 221.48, "end": 225.28, "text": "굳이 여러 장을 겹치면 컴퓨터가 더 힘들어 할 것 같은데요?"}, {"start": 225.28, "end": 230.12, "text": "그게 용량을 절약하거나 게임을 부드럽게 만드는 거랑 무슨 상관이 있는 거죠?"}, {"start": 230.12, "end": 232.95999999999998, "text": "직관적으로는 그렇게 생각하기 쉽습니다"}, {"start": 232.95999999999998, "end": 237.6, "text": "여기서 고정 게임인 스트릿파이터 2의 캔 스테이지를 한번 상상해 보세요"}, {"start": 237.6, "end": 241.12, "text": "아, 그 뒤에 배 떠 있고 사람들이 막 구경하는 그 맵이요?"}, {"start": 241.12, "end": 242.07999999999998, "text": "맞습니다"}, {"start": 242.07999999999998, "end": 247.67999999999998, "text": "거기 보면 배경, 구조물, 그리고 캐릭터의 움직임이 다 따로 노는 걸 볼 수 있거든요"}, {"start": 247.67999999999998, "end": 249.76, "text": "오, 듣고 보니 그러네요"}, {"start": 249.79999999999998, "end": 251.67999999999998, "text": "캐릭터만 엄청 빠르게 움직이죠?"}, {"start": 251.67999999999998, "end": 256.52, "text": "네, 만약 배경이랑 캐릭터가 도화지 한 장에 통째로 그려져 있다면"}, {"start": 256.52, "end": 261.15999999999997, "text": "캐릭터가 주목을 뻗을 때마다 그 넓은 하늘이랑 건물까지"}, {"start": 261.15999999999997, "end": 264.08, "text": "1초에 60번씩 전부 다 새로 그려야 합니다"}, {"start": 264.08, "end": 266.03999999999996, "text": "헉, 배경 전체를 다 새로요?"}, {"start": 266.03999999999996, "end": 269.15999999999997, "text": "네, 옛날 기계들은 바로 뻗어버리죠"}, {"start": 269.15999999999997, "end": 271.88, "text": "하지만 이걸 투명한 필름으로 분리해두면"}, {"start": 271.88, "end": 277.52, "text": "배경 레이어는 가만히 놔두고 맨 앞에 캐릭터 필름에서만 움직임을 계상하면 됩니다"}, {"start": 277.52, "end": 281.79999999999995, "text": "애니메이션 처리와 충돌 감지를 엄청 효율적으로 할 수 있는 거죠"}, {"start": 281.79999999999995, "end": 284.08, "text": "와, 진짜 똑똑하네요"}, {"start": 284.08, "end": 287.12, "text": "다시 그리는 비용을 극단적으로 줄이려고"}, {"start": 287.12, "end": 291.32, "text": "멈춰있는 건 냅두고 움직이는 필름만 넘기는 거였군요"}, {"start": 291.32, "end": 292.28, "text": "맞습니다"}, {"start": 292.28, "end": 294.59999999999997, "text": "이걸 더 큰 그림으로 연결해보자면"}, {"start": 294.59999999999997, "end": 298.0, "text": "과거 슈퍼마리오가 구름이랑 풀 모양을 똑같이 만들어서"}, {"start": 298.0, "end": 299.79999999999995, "text": "색깔만 바꿔 우려먹었잖아요"}, {"start": 299.79999999999995, "end": 301.35999999999996, "text": "램에 완전 똑같죠"}, {"start": 301.35999999999996, "end": 303.84, "text": "그게 단순 용량 때문만이 아니라"}, {"start": 303.88, "end": 306.4, "text": "당시 램에 부족한 처리력을 커버하기 위한"}, {"start": 306.4, "end": 308.56, "text": "진짜 기막힌 꼼수였던 겁니다"}, {"start": 308.56, "end": 311.08, "text": "움직이면서 이 순서가 바뀌기도 하나요?"}, {"start": 311.08, "end": 312.96, "text": "정확히 짚으셨습니다"}, {"start": 312.96, "end": 315.64, "text": "바로 그 지점에서 다음 개념이 등장합니다"}, {"start": 315.64, "end": 316.71999999999997, "text": "오, 어떤 거죠?"}, {"start": 316.71999999999997, "end": 320.08, "text": "레이어는 원래 정해진 순서로 쌓이지만"}, {"start": 320.08, "end": 324.55999999999995, "text": "프로그래밍을 통해 실시간으로 램 공간을 할당받아서"}, {"start": 324.55999999999995, "end": 329.96, "text": "게임 중에 그 프레임의 앞뒤 순서가 변하는 것을 동적 변화 레이어라고 합니다"}, {"start": 329.96, "end": 333.12, "text": "잠깐만요, 실시간으로 램 공간을 할당한다고요?"}, {"start": 333.12, "end": 334.24, "text": "네, 맞습니다"}, {"start": 334.24, "end": 338.52, "text": "이 대목에서 청추자분들도 비슷하게 생각하실 것 같은데"}, {"start": 338.52, "end": 342.64, "text": "요새 SSD나 하드디스크 용량이 수백 기가바이트잖아요"}, {"start": 342.64, "end": 344.84000000000003, "text": "그냥 거기에 전부 다 저장해놓고"}, {"start": 344.84000000000003, "end": 346.88, "text": "거기서 바로바로 꺼냈으면 안 되나요?"}, {"start": 346.88, "end": 350.64, "text": "아, 그렇게 하면 게임이 똑똑 끊겨서 플레이를 못 합니다"}, {"start": 350.64, "end": 352.52, "text": "하드웨어의 물리적 한계 때문이죠"}, {"start": 352.52, "end": 353.88, "text": "속도 차이 때문인가요?"}, {"start": 353.88, "end": 354.84000000000003, "text": "맞습니다"}, {"start": 354.84000000000003, "end": 356.56, "text": "아주 쉽게 비유해볼게요"}, {"start": 356.56, "end": 360.0, "text": "SSD는 저 멀리 있는 거대한 물류 창고고요"}, {"start": 360.04, "end": 363.64, "text": "램은 여러분 눈앞에 있는 작은 작업용 책상입니다"}, {"start": 363.64, "end": 365.0, "text": "아, 창고와 책상?"}, {"start": 365.0, "end": 368.28, "text": "네, 캐릭터가 나무 뒤로 숨을 때마다"}, {"start": 368.28, "end": 373.16, "text": "CPU가 저 멀리 물류 창고까지 뛰어가서 데이터를 가져오면 너무 느리잖아요"}, {"start": 373.16, "end": 374.76, "text": "그렇죠, 엄청 오래 걸리겠네요"}, {"start": 374.76, "end": 379.48, "text": "그래서 실행에 필요한 파일만 속도가 미친 듯이 빠른 앞에 책상"}, {"start": 379.48, "end": 382.04, "text": "즉, 램에 미리 왕창 올려두는 겁니다"}, {"start": 382.04, "end": 387.08, "text": "아하, 우리가 아는 그 로딩 화면이 바로 책상에 물건 올려놓는 시간이군요"}, {"start": 387.08, "end": 388.44, "text": "정확합니다"}, {"start": 388.44, "end": 392.4, "text": "램은 전원이 꺼지면 다 지워지는 휘발성 메모리지만"}, {"start": 392.4, "end": 395.44, "text": "오직 게임이 실행되는 그 실시간 동안"}, {"start": 395.44, "end": 400.68, "text": "캐릭터가 겹치는 순서 변경을 마법처럼 처리하는데 꼭 필요한 공간인 거죠"}, {"start": 400.68, "end": 403.72, "text": "와, 여기서부터가 진짜 흥미로운 부분인데요"}, {"start": 403.72, "end": 404.4, "text": "네"}, {"start": 404.4, "end": 408.48, "text": "그러니까 메모리 위에서 실시간으로 마술을 부리는 거네요?"}, {"start": 408.48, "end": 412.92, "text": "근데 가만 생각해보면 캐릭터 몇 개는 책상에 올린다 쳐도"}, {"start": 412.92, "end": 419.28000000000003, "text": "캐릭터가 밝고 서 있는 그 거대한 지형이나 배경 자체는 어떻게 구축하는 건가요?"}, {"start": 419.28000000000003, "end": 420.6, "text": "지형 통체로요"}, {"start": 420.6, "end": 425.72, "text": "네, 그 넓은 세상을 다 램에 올리려면 용량이 터질 것 같은데요?"}, {"start": 425.72, "end": 427.28000000000003, "text": "좋은 질문입니다"}, {"start": 427.28000000000003, "end": 432.40000000000003, "text": "그래서 과거 기획자들이 레고 블록 같은 기술을 발명했죠"}, {"start": 432.40000000000003, "end": 436.76, "text": "타일맵은 아주 작은 단위의 이미지를 반복 배치해서"}, {"start": 436.76, "end": 439.56, "text": "메모리 사용량을 엄청나게 절감하면서"}, {"start": 439.56, "end": 442.6, "text": "거대한 맵 레이아웃을 구성하는 기법입니다"}, {"start": 442.64000000000004, "end": 445.36, "text": "오, 작은 이미지를 반복해서 배치한다고요?"}, {"start": 445.36, "end": 447.36, "text": "마치 화장실 타일처럼요?"}, {"start": 447.36, "end": 448.84000000000003, "text": "네, 비슷한 원리죠"}, {"start": 448.84000000000003, "end": 452.16, "text": "그럼 똑같은 흑바닥 타일만 계속 이어붙여질 텐데"}, {"start": 452.16, "end": 457.08000000000004, "text": "화면이 너무 단조롭고 그냥 네모 빤듯한 엑셀표처럼 보이지 않을까요?"}, {"start": 457.08000000000004, "end": 458.96000000000004, "text": "그렇게 보일 수 있죠"}, {"start": 458.96000000000004, "end": 464.0, "text": "그래서 기획자들이 착실을 이용한 기막힌 투형 방식을 고안해냈습니다"}, {"start": 464.0, "end": 465.40000000000003, "text": "오, 어떤 방식이죠?"}, {"start": 465.40000000000003, "end": 468.0, "text": "단순한 정면 직교 투형도 있지만요"}, {"start": 468.0, "end": 470.36, "text": "디아블로 같은 명작 게임 해보셨죠?"}, {"start": 470.36, "end": 472.32000000000005, "text": "아, 디아블로 무조건 해봤죠"}, {"start": 472.36, "end": 474.76, "text": "위에서 비스듬하게 내려다보는 시점이잖아요?"}, {"start": 474.76, "end": 475.84, "text": "맞아요"}, {"start": 475.84, "end": 481.64, "text": "그게 바로 다이아몬드 형 타일을 45도 회전시킨 등각 투형 방식을 사용한 겁니다"}, {"start": 481.64, "end": 483.76, "text": "아, 타일을 45도 틀어버린 거군요?"}, {"start": 483.76, "end": 489.84, "text": "네, 그렇게 하면 시스템 내무적으로는 그냥 평면 네모 타일들을 붙인건데"}, {"start": 489.84, "end": 493.96, "text": "훨씬 입체적이고 다채로운 시각적 효과를 낼 수 있죠"}, {"start": 493.96, "end": 497.12, "text": "와, 그냥 네모난 타일을 이어 붙이는 게 아니었군요"}, {"start": 497.12, "end": 500.68, "text": "각도를 비틀어서 뇌를 속이는 진짜 영리한 트릭이네요"}, {"start": 500.68, "end": 501.56, "text": "맞습니다"}, {"start": 501.56, "end": 508.16, "text": "그런데 생각해보면 이 타일들은 단순히 예쁜 배경화면 역할만 하고 끝나는 건 아닐 것 같아요"}, {"start": 508.16, "end": 510.68, "text": "캐릭터랑 상호작용은 어떻게 되는 건가요?"}, {"start": 510.68, "end": 512.72, "text": "뭐 절벽에서 떨어지거나 하는 거요?"}, {"start": 512.72, "end": 517.44, "text": "그 질문이 바로 ETT 게임 아키텍츠르의 핵심입니다"}, {"start": 517.44, "end": 523.8, "text": "타일은 단순한 이미지를 넘어서 지형 속성, 이동 가능 여부, 높이 값 등"}, {"start": 523.8, "end": 529.16, "text": "게임 내 오브젝트와 상호작용하기 위한 구체적인 데이터를 포함하고 있습니다"}, {"start": 529.1999999999999, "end": 530.4399999999999, "text": "오, 잠깐만요"}, {"start": 530.4399999999999, "end": 534.8399999999999, "text": "눈에 보이는 그림 뒤에 보이지 않는 속상 데이터가 1대1로 매핑되어 있다는 게"}, {"start": 534.8399999999999, "end": 538.12, "text": "정확히 어떤 식으로 게임 플레이 적용되는 건가요? 와닿지가 않아서요"}, {"start": 538.12, "end": 541.28, "text": "스타디오 밸리 같은 농장 게임을 예로 들어볼게요"}, {"start": 541.28, "end": 542.6, "text": "힐링 게임이요?"}, {"start": 542.6, "end": 546.04, "text": "농장을 돌아다닐 때 보면 다 비슷한 흑바닥 타일 같잖아요"}, {"start": 546.04, "end": 548.3199999999999, "text": "그렇죠, 그냥 다 갈색 흙이죠"}, {"start": 548.3199999999999, "end": 551.8, "text": "근데 어떤 타일에는 괭이지를 해서 장물을 심을 수 있는데"}, {"start": 551.8, "end": 555.12, "text": "바로 옆 타일에는 건물을 지을 수 없게 시스템이 막아버립니다"}, {"start": 555.12, "end": 557.92, "text": "아, 맞아요. 빨간색으로 뜨면서 안 될 때가 있어요"}, {"start": 557.92, "end": 560.9599999999999, "text": "네, 그게 플레이어 눈에는 그냥 농장이지만"}, {"start": 560.9599999999999, "end": 564.8, "text": "컴퓨터 눈에는 이동 가능은 1, 시야 심기 가능은 0"}, {"start": 564.8, "end": 568.4, "text": "이렇게 0과 1로 빼곡하게 채워진 거대한 데이터 표가"}, {"start": 568.4, "end": 570.68, "text": "그림 뒤에 철저하게 지정되어 있기 때문입니다"}, {"start": 570.68, "end": 574.0, "text": "아하, 그림 뒤에 엑셀 표가 숨어 있는 거나 마찬가지네요"}, {"start": 574.0, "end": 577.1999999999999, "text": "정확합니다. 그 데이터가 캐릭터의 행동을 통제하는 거죠"}, {"start": 577.1999999999999, "end": 580.28, "text": "와, 깊은 깨달음을 얻었습니다"}, {"start": 580.28, "end": 582.92, "text": "그래서 이게 다 무슨 의미인 거죠?"}, {"start": 582.92, "end": 586.9599999999999, "text": "아름다운 배경조차도 사실은 숨겨진 통제 데이트의 집합이라면요?"}, {"start": 586.9599999999999, "end": 587.4399999999999, "text": "네"}, {"start": 587.44, "end": 591.44, "text": "그 똑똑한 타일 위에를 뛰어 다니고 막 공격하는 캐릭터"}, {"start": 591.44, "end": 596.5600000000001, "text": "그러니까 ED 오브젝트 자체는 도대체 어떻게 생동감 있게 만들어주는 건가요?"}, {"start": 596.5600000000001, "end": 598.8000000000001, "text": "거기서 ED 게임의 생명을 불어넣는"}, {"start": 598.8000000000001, "end": 601.5200000000001, "text": "가장 핵심적인 장치인 스프라이트가 등장합니다"}, {"start": 601.5200000000001, "end": 602.12, "text": "스프라이트요?"}, {"start": 602.12, "end": 602.8800000000001, "text": "네"}, {"start": 602.8800000000001, "end": 605.6800000000001, "text": "스프라이트는 각 프레임별 이미지 데이터뿐만 아니라"}, {"start": 605.6800000000001, "end": 609.5200000000001, "text": "출력될 기준점인 피봇과 충돌 박스 정보까지 저장해서"}, {"start": 609.5200000000001, "end": 612.0, "text": "애니메이션을 총괄 관리하는 핵심 클래스입니다"}, {"start": 612.0, "end": 615.6, "text": "어, 클래스라고요? 그게 정확히 뭔가요?"}, {"start": 615.6, "end": 619.12, "text": "어릴 때 교과서 모서리에 졸라맨 그려서"}, {"start": 619.12, "end": 621.96, "text": "차르르 넘기는 플립북 애니메이션 있잖아요?"}, {"start": 621.96, "end": 623.88, "text": "네, 많이들 그려보셨을 겁니다"}, {"start": 623.88, "end": 626.2, "text": "그거랑 정확히 뭐가 다른 건가요?"}, {"start": 626.2, "end": 627.64, "text": "완전히 다릅니다"}, {"start": 627.64, "end": 630.44, "text": "플립북은 단순히 그림만 넘기는 거잖아요?"}, {"start": 630.44, "end": 632.24, "text": "물리법칙이랑은 상관이 없죠?"}, {"start": 632.24, "end": 633.12, "text": "아, 그렇죠"}, {"start": 633.12, "end": 635.76, "text": "하지만 스프라이트 안에는 캐릭터가 공격을 가할 때"}, {"start": 635.76, "end": 637.9200000000001, "text": "판정되는 타격 박스 데이터랑"}, {"start": 637.9200000000001, "end": 642.72, "text": "적의 공격을 맞았을 때 피가 깎이는 피격 박스 데이터가 딱 부척되어 있습니다"}, {"start": 642.76, "end": 646.52, "text": "아, 눈에 보이지 않는 상자가 통째로 붙어 있다는 거군요?"}, {"start": 646.52, "end": 649.84, "text": "네, 그걸로 정밀하게 애니메이션을 제어하죠"}, {"start": 649.84, "end": 652.08, "text": "필요한 이미지 부분만 가위로 오려내듯"}, {"start": 652.08, "end": 654.96, "text": "잘라서 쓰는 클리핑도 다 여기서 이루어집니다"}, {"start": 654.96, "end": 659.6800000000001, "text": "우와, 때리고 맞는 판정까지 하나의 데이터 세트로 묶여 있군요"}, {"start": 659.6800000000001, "end": 661.96, "text": "맞습니다, 우리가 느끼는 타격감은"}, {"start": 661.96, "end": 664.72, "text": "투명 상자 두 개가 겹쳐진 결과물인 거죠"}, {"start": 664.72, "end": 666.6800000000001, "text": "그런데 이렇게 들으니까"}, {"start": 666.6800000000001, "end": 669.88, "text": "동작 하나하나를 다 그림으로 그리고"}, {"start": 669.88, "end": 672.64, "text": "거기에 삼자 데이터까지 일일이 묶어 놓으면"}, {"start": 672.64, "end": 675.56, "text": "용량이나 작업량이 진짜 어마어마할 텐데요?"}, {"start": 675.56, "end": 678.88, "text": "엄청나죠, 일일이 다 그리려면 끝이 없습니다"}, {"start": 678.88, "end": 682.6, "tex t": 755.84, "end": 758.4, "text": "이제 여러분이 2D 게임을 플레이할 때"}, {"start": 758.4, "end": 761.2, "text": "그저 예쁜 그래픽만 보이지는 않으실 겁니다"}, {"start": 761.2, "end": 763.72, "text": "확실히 다른 시각으로 보시게 될 거예요"}, {"start": 763.72, "end": 765.84, "text": "층층이 분리돼서 쌓인 레이어들"}, {"start": 765.84, "end": 769.4, "text": "또 보이지 않는 속성 데이터를 품은 똑똑한 타일맥"}, {"start": 769.4, "end": 772.96, "text": "그리고 피격 박스를 감추고 있는 스프라이트랑"}, {"start": 772.96, "end": 774.6800000000001, "text": "투명한 뼈대가 심어져서"}, {"start": 774.6800000000001, "end": 777.6, "text": "색깔만 바뀐 아바타들이 막 눈에 보일 겁니다"}, {"start": 777.6, "end": 780.8000000000001, "text": "여러분은 방금 2D 게임 세계의 매트릭스 코드를"}, {"start": 780.8000000000001, "end": 782.6, "text": "완벽하게 들여다보신 거니까요"}, {"start": 782.6, "end": 783.72, "text": "맞습니다"}, {"start": 783.72, "end": 786.1600000000001, "text": "자, 이 시점에서 마지막으로 여러분께"}, {"start": 786.1600000000001, "end": 790.0, "text": "깊이 생각해볼 만한 도발적인 질문을 하나 던지고 싶네요"}, {"start": 790.0, "end": 791.0, "text": "오, 어떤 질문이죠?"}, {"start": 791.0, "end": 795.24, "text": "우리가 오늘 다룬 팔레트 시스템이나 레이어 최적화 기술들은"}, {"start": 795.24, "end": 798.2, "text": "사실 모두 과거에 엄청나게 빡빡했던"}, {"start": 798.2, "end": 801.9200000000001, "text": "메모리 용량 제한 때문에 탄생한 눈물겨운 꼼수들이었습니다"}, {"start": 801.9200000000001, "end": 804.28, "text": "그렇죠, 1MB도 아쉽던 시절이니까요"}, {"start": 804.28, "end": 807.96, "text": "그렇다면 기가바이트 단위의 램이 기본이 된 오늘날"}, {"start": 807.96, "end": 811.52, "text": "개발자들은 이런 극한의 최적화 기술을 잃어버리고"}, {"start": 811.52, "end": 812.76, "text": "박만해진 걸까요?"}, {"start": 812.8, "end": 815.4, "text": "음, 요새 기계들이 워낙 좋으니까요"}, {"start": 815.4, "end": 818.36, "text": "아니면 이 넘쳐나는 메모리를 활용해서"}, {"start": 818.36, "end": 821.0, "text": "우리가 상상도 못한 전혀 다른 형태의"}, {"start": 821.0, "end": 823.4399999999999, "text": "거대한 게임 기획을 준비하고 있는 걸까요?"}, {"start": 823.4399999999999, "end": 825.48, "text": "와, 진짜 흥미로운 포인트네요"}, {"start": 825.48, "end": 827.96, "text": "다음 번에 새로운 게임을 켤 때"}, {"start": 827.96, "end": 831.16, "text": "이 질문을 한번 깊이 고민해보시길 바랍니다"}];

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    showSlide(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
    });
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        list.appendChild(item);
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    // 오디오 전체 길이: audioSlides의 마지막 end 또는 audio.duration
    const totalDur = audioSlides.length > 0
        ? Math.max(...audioSlides.map(s => s.end || 0))
        : 1;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const left = (s.start / totalDur) * 100;
        const width = ((s.end - s.start) / totalDur) * 100;
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.left = left + '%';
        seg.style.width = width + '%';
        seg.textContent = slide.id;
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
    });
}

function updateAudioMap(currentIdx) {
    document.querySelectorAll('.map-segment').forEach(seg => {
        seg.classList.toggle('active', parseInt(seg.dataset.idx) === currentIdx);
    });
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '🎵 오디오 포함';
        badge.className = 'badge-audio';
    } else {
        badge.textContent = '📖 교안 전용';
        badge.className = 'badge-no-audio';
    }
    // 네비게이션 도트 활성화
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    // 인덱스 패널 활성화
    document.querySelectorAll('.index-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        if (i === index) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    });
    // 오디오 맵 활성화
    updateAudioMap(index);

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (정렬된 audioSlides 사용)
function syncSlideToTime(t) {
    let targetIdx = -1;
    for (let i = audioSlides.length - 1; i >= 0; i--) {
        if (t >= audioSlides[i].start) {
            targetIdx = audioSlides[i].idx;
            break;
        }
    }
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.textContent = '▶';
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

init();

</script>
